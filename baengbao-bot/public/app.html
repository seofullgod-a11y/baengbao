<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<link rel="icon" type="image/png" href="logo.png" />
<title>แบ่งเบา — เมนูและรายงาน</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Kanit:wght@500;600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet" />
<script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#f6f9ff; --card:#fff; --ink:#0a1f44; --ink-soft:#51688f; --ink-faint:#8197b8;
    --blue:#1f6bff; --blue-deep:#0b49c9; --blue-bright:#4d8dff; --sky:#bfd9ff; --border:#dce7fb;
    --profit:#00a86b; --profit-soft:#e3f8ef; --warn:#f0883e; --danger:#e5484d;
    --r-md:16px; --r-lg:22px; --shadow:0 10px 26px -14px rgba(16,51,122,.28);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{font-family:"IBM Plex Sans Thai",system-ui,sans-serif;background:var(--bg);color:var(--ink);line-height:1.55;padding-bottom:90px}
  h1,h2,h3,.display{font-family:"Kanit",sans-serif;letter-spacing:-.01em}
  .mono{font-family:"IBM Plex Mono",monospace;font-variant-numeric:tabular-nums}
  .wrap{max-width:560px;margin:0 auto;padding:0 16px}

  header{background:linear-gradient(150deg,var(--blue),var(--blue-deep));color:#fff;padding:20px 0 16px;box-shadow:var(--shadow)}
  header .wrap{display:flex;align-items:center;gap:11px}
  header .logo{width:38px;height:38px;border-radius:11px;background:transparent;display:grid;place-items:center;flex:none;overflow:hidden}
  header .logo svg{width:22px;height:22px}
  header .logo img{width:100%;height:100%;object-fit:cover;display:block}
  header h1{font-size:19px;font-weight:700;line-height:1.2}
  header p{font-size:13px;opacity:.85;margin-top:1px}

  .tabs{position:sticky;top:0;z-index:30;background:linear-gradient(150deg,var(--blue),var(--blue-deep));padding-bottom:0}
  .tabs .wrap{display:flex;gap:6px}
  .tab{flex:1;text-align:center;padding:12px 0 13px;color:rgba(255,255,255,.7);font-family:"Kanit";font-weight:600;font-size:14px;border-bottom:3px solid transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
  .tab svg{width:17px;height:17px}
  .tab.active{color:#fff;border-bottom-color:#fff}

  .view{display:none}
  .view.active{display:block}

  /* ---- menu tab ---- */
  .whatif{background:var(--card);margin:16px 0 0;border-radius:var(--r-md);padding:15px 16px;box-shadow:var(--shadow)}
  .whatif .top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .whatif .lab{font-size:13.5px;color:var(--ink-soft);font-weight:600;display:flex;align-items:center;gap:7px}
  .whatif .lab svg{width:16px;height:16px;color:var(--warn)}
  .whatif .val{font-family:"IBM Plex Mono";font-weight:600;background:#fff3e9;color:var(--warn);padding:3px 11px;border-radius:8px;font-size:14px}
  input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:6px;background:#e7eefb;outline:none}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;border:5px solid var(--warn);box-shadow:0 2px 6px rgba(0,0,0,.2)}

  .section-title{display:flex;justify-content:space-between;align-items:center;margin:22px 2px 12px}
  .section-title h2{font-size:16px;font-weight:600}
  .section-title .count{font-size:13px;color:var(--ink-faint)}

  .menu{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:15px 16px;margin-bottom:11px;box-shadow:0 2px 8px rgba(16,51,122,.04)}
  .menu .row1{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
  .menu .name{font-family:"Kanit";font-weight:600;font-size:16.5px;flex:1}
  .menu .profit{text-align:right;flex:none}
  .menu .profit .num{font-family:"Kanit";font-weight:700;font-size:21px;color:var(--profit);line-height:1.1}
  .menu .profit .num.neg{color:var(--danger)}
  .menu .profit .cap{font-size:11px;color:var(--ink-faint)}
  .menu .bar{height:7px;border-radius:5px;background:#eef2f9;margin:11px 0 9px;overflow:hidden;display:flex}
  .menu .bar .mat{background:var(--warn)}.menu .bar .lab{background:var(--blue-bright)}.menu .bar .pf{background:var(--profit)}
  .menu .meta{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:12.5px;color:var(--ink-soft)}
  .menu .meta b{color:var(--ink);font-weight:600}
  .menu .meta .sw{display:inline-block;width:8px;height:8px;border-radius:2px;margin-right:5px;vertical-align:middle}
  .menu .pill{font-family:"Kanit";font-weight:600;font-size:12px;padding:3px 9px;border-radius:100px;background:var(--profit-soft);color:var(--profit);margin-top:2px;display:inline-block}
  .menu .pill.neg{background:#fde8e8;color:var(--danger)}
  .menu .acts{display:flex;gap:8px;margin-top:12px;padding-top:11px;border-top:1px solid var(--border)}
  .menu .acts button{flex:1;border:1px solid var(--border);background:#fff;border-radius:9px;padding:8px;font-family:"IBM Plex Sans Thai";font-weight:600;font-size:13.5px;color:var(--ink-soft);display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer}
  .menu .acts button svg{width:15px;height:15px}
  .menu .acts .del{color:var(--danger);border-color:#f6d4d5}

  .empty{text-align:center;padding:46px 20px;color:var(--ink-faint)}
  .empty svg{width:54px;height:54px;color:var(--sky);margin-bottom:14px}
  .empty p{font-size:15px}

  .fab{position:fixed;left:50%;transform:translateX(-50%);bottom:20px;z-index:20;background:var(--blue);color:#fff;border:none;border-radius:100px;padding:15px 26px;font-family:"Kanit";font-weight:600;font-size:16px;box-shadow:0 12px 26px -8px rgba(31,107,255,.6);display:flex;align-items:center;gap:8px;cursor:pointer}
  .fab svg{width:20px;height:20px}
  .fab.hide{display:none}

  /* ---- dashboard tab ---- */
  .monthnav{display:flex;align-items:center;justify-content:center;gap:18px;margin:18px 0 4px}
  .monthnav button{width:36px;height:36px;border-radius:10px;border:1px solid var(--border);background:#fff;display:grid;place-items:center;cursor:pointer;color:var(--ink-soft)}
  .monthnav button:disabled{opacity:.35}
  .monthnav button svg{width:18px;height:18px}
  .monthnav .lbl{font-family:"Kanit";font-weight:600;font-size:17px;min-width:130px;text-align:center}

  .kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:14px 0}
  .kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:13px 12px;text-align:center}
  .kpi .k{font-size:11.5px;color:var(--ink-faint);margin-bottom:5px}
  .kpi .v{font-family:"Kanit";font-weight:700;font-size:18px;line-height:1.1}
  .kpi.inc .v{color:var(--profit)} .kpi.exp .v{color:var(--warn)} .kpi.pf .v{color:var(--blue)}
  .kpi.pf .v.neg{color:var(--danger)}

  .panel{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:16px;margin-bottom:13px}
  .panel h3{font-size:15px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
  .panel h3 svg{width:17px;height:17px;color:var(--blue)}
  .chartbox{position:relative;height:210px}
  .chartbox.sm{height:200px}

  .tx{display:flex;align-items:center;gap:11px;padding:11px 0;border-bottom:1px solid #eef2f9}
  .tx:last-child{border-bottom:none}
  .tx .ic{width:34px;height:34px;border-radius:10px;display:grid;place-items:center;flex:none}
  .tx .ic svg{width:17px;height:17px}
  .tx.inc .ic{background:var(--profit-soft);color:var(--profit)} .tx.exp .ic{background:#fdebe0;color:var(--warn)}
  .tx .mid{flex:1;min-width:0}
  .tx .mid .t1{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tx .mid .t2{font-size:11.5px;color:var(--ink-faint)}
  .tx .amt{font-family:"Kanit";font-weight:600;font-size:15px;flex:none}
  .tx.inc .amt{color:var(--profit)} .tx.exp .amt{color:var(--warn)}
  .tx .trash{background:none;border:none;color:var(--ink-faint);padding:6px;cursor:pointer;flex:none}
  .tx .trash svg{width:17px;height:17px}

  /* ---- sheet (add/edit menu) ---- */
  .sheet-bg{position:fixed;inset:0;background:rgba(10,31,68,.45);z-index:40;opacity:0;pointer-events:none;transition:.2s}
  .sheet-bg.show{opacity:1;pointer-events:auto}
  .sheet{position:fixed;left:0;right:0;bottom:0;z-index:41;background:#fff;border-radius:22px 22px 0 0;padding:20px 18px calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform .26s cubic-bezier(.16,1,.3,1);max-width:560px;margin:0 auto;box-shadow:0 -10px 40px rgba(16,51,122,.2)}
  .sheet.show{transform:translateY(0)}
  .sheet h3{font-size:18px;font-weight:600;margin-bottom:16px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:13.5px;color:var(--ink-soft);font-weight:600;margin-bottom:6px}
  .field input{width:100%;border:1.5px solid var(--border);border-radius:11px;padding:12px 13px;font-family:"IBM Plex Sans Thai";font-size:16px;color:var(--ink);outline:none}
  .field input:focus{border-color:var(--blue-bright)}
  .field.num input{font-family:"IBM Plex Mono"}
  .live{background:var(--bg);border-radius:12px;padding:12px 14px;margin:4px 0 16px;display:flex;justify-content:space-between;align-items:center}
  .live .l{font-size:13px;color:var(--ink-soft)}
  .live .v{font-family:"Kanit";font-weight:700;font-size:20px;color:var(--profit)}
  .live .v.neg{color:var(--danger)}
  .sheet .save{width:100%;background:var(--blue);color:#fff;border:none;border-radius:13px;padding:15px;font-family:"Kanit";font-weight:600;font-size:16px;cursor:pointer}
  .sheet .cancel{width:100%;background:none;border:none;color:var(--ink-faint);padding:13px;font-size:14px;margin-top:4px;cursor:pointer}

  .loading{text-align:center;padding:50px 20px;color:var(--ink-faint)}
  .spin{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;margin:0 auto 14px;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fff;padding:11px 18px;border-radius:100px;font-size:14px;z-index:60;opacity:0;transition:.25s;pointer-events:none}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  /* ---- goals / settings / cost ---- */
  .goalcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r-md);padding:18px;margin-bottom:14px}
  .goalcard .gh{font-size:13px;color:var(--ink-faint,#9aa9c2);margin-bottom:6px}
  .goalcard .grow{display:flex;justify-content:space-between;align-items:baseline}
  .goalcard .gnow{font-family:"Kanit";font-weight:700;font-size:20px;color:var(--ink)}
  .goalcard .gtarget{font-size:13px;color:var(--ink-soft)}
  .pbar{height:10px;background:#edf2fb;border-radius:6px;overflow:hidden;margin:10px 0 8px}
  .pfill{height:100%;border-radius:6px;background:var(--blue);transition:width .5s ease}
  .pfill.done{background:var(--profit)}
  .ghint{font-size:12.5px;color:var(--ink-soft)}
  .ghint.done{color:var(--profit);font-weight:600}
  .goalform{display:flex;gap:10px;margin-top:6px}
  .goalform input{flex:1;min-width:0;border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-family:"IBM Plex Sans Thai";font-size:15px}
  .goalform button{border:none;background:var(--blue);color:#fff;border-radius:10px;padding:0 16px;font-family:"Kanit";font-weight:600;font-size:14px;cursor:pointer}
  .setrow{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:15px 0;border-bottom:1px solid var(--border)}
  .setrow:last-child{border-bottom:none}
  .setrow .sl{font-weight:600;font-size:14.5px}
  .setrow .sd{font-size:12.5px;color:var(--ink-soft);margin-top:3px}
  .switch{flex:none;width:48px;height:28px;border-radius:16px;background:#cdd9ee;position:relative;cursor:pointer;transition:.2s}
  .switch.on{background:var(--profit)}
  .switch::after{content:"";position:absolute;top:3px;left:3px;width:22px;height:22px;border-radius:50%;background:#fff;transition:.2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .switch.on::after{left:23px}
  .bigbtn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;border:none;background:var(--profit);color:#fff;border-radius:12px;padding:14px;font-family:"Kanit";font-weight:600;font-size:15px;cursor:pointer;text-decoration:none;margin-top:4px}
  .bigbtn svg{width:18px;height:18px}
  .bigbtn.ghost{background:#eef3fc;color:var(--blue)}
  .costrow{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
  .costrow:last-child{border-bottom:none}
  .costrow .cn{font-weight:600;font-size:14px}
  .costrow .cs{font-size:11px;color:var(--ink-faint,#9aa9c2);margin-top:2px}
  .cbadge{font-weight:700;font-size:13.5px;flex:none}
  .warnbox{background:#fdebe8;border-radius:10px;padding:11px 13px;color:var(--danger,#e5484d);font-weight:600;font-size:13.5px;margin-bottom:6px}
  .typetoggle{display:flex;gap:8px}
  .typetoggle .tt{flex:1;border:1.5px solid var(--border);background:#fff;border-radius:11px;padding:12px;font-family:"Kanit";font-weight:600;font-size:15px;color:var(--ink-soft);cursor:pointer}
  .typetoggle .tt.on[data-t="income"]{background:var(--profit);border-color:var(--profit);color:#fff}
  .typetoggle .tt.on[data-t="expense"]{background:var(--warn,#f0883e);border-color:var(--warn,#f0883e);color:#fff}
  .tx .edit{background:none;border:none;color:var(--blue);cursor:pointer;padding:6px;margin-right:-2px}
  .tx .edit svg{width:17px;height:17px}
  .recur{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--border)}
  .recur.off{opacity:.55}
  .rc-mid{flex:1;min-width:0}
  .rc-name{font-weight:600;font-size:14.5px}
  .rc-sub{font-size:12px;color:var(--ink-soft);margin-top:2px}
  .switch.sm{width:42px;height:24px;flex:none}
  .switch.sm::after{width:18px;height:18px}
  .switch.sm.on::after{left:21px}
  .recur .trash{background:none;border:none;color:#c3cfe2;cursor:pointer;padding:5px}
  .recur .trash svg{width:17px;height:17px}
  .recur-add{margin-top:14px;display:flex;flex-direction:column;gap:9px}
  .recur-add input{border:1.5px solid var(--border);border-radius:10px;padding:11px 12px;font-family:"IBM Plex Sans Thai";font-size:15px;width:100%}
  .recur-add-row{display:flex;gap:9px}
  .recur-add-row input{flex:1;min-width:0}
  .recur-add-row button{flex:none;border:none;background:var(--profit);color:#fff;border-radius:10px;padding:0 18px;font-family:"Kanit";font-weight:600;font-size:14px;cursor:pointer}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <span class="logo"><img src="logo.png" alt="แบ่งเบา" /></span>
    <div><h1>แบ่งเบา</h1><p>ผู้ช่วยบัญชีร้านอาหาร</p></div>
  </div>
</header>
<div class="tabs">
  <div class="wrap">
    <div class="tab active" data-tab="menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11h18"/><path d="M5 11V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4"/><path d="M5 11v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8"/></svg>เมนู</div>
    <div class="tab" data-tab="report"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><rect x="7" y="11" width="3" height="6" rx="1"/><rect x="12" y="7" width="3" height="10" rx="1"/><rect x="17" y="13" width="3" height="4" rx="1"/></svg>รายงาน</div>
    <div class="tab" data-tab="goals"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1"/></svg>เป้า</div>
    <div class="tab" data-tab="settings"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1Z"/></svg>ตั้งค่า</div>
  </div>
</div>

<!-- MENU VIEW -->
<div class="view active" id="view-menu">
  <div class="wrap">
    <div class="whatif">
      <div class="top">
        <span class="lab"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg> วัตถุดิบขึ้นราคา</span>
        <span class="val mono" id="upVal">0 %</span>
      </div>
      <input type="range" id="up" min="0" max="80" value="0" step="5">
    </div>
    <div class="section-title"><h2>เมนูของร้าน</h2><span class="count" id="count"></span></div>
    <div id="list"><div class="loading"><div class="spin"></div>กำลังโหลด...</div></div>
  </div>
</div>

<!-- REPORT VIEW -->
<div class="view" id="view-report">
  <div class="wrap">
    <div class="monthnav">
      <button id="prevM"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg></button>
      <span class="lbl" id="mLabel">—</span>
      <button id="nextM"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></button>
    </div>
    <div id="report"><div class="loading"><div class="spin"></div>กำลังโหลด...</div></div>
    <div id="costPanel"></div>
  </div>
</div>

<!-- GOALS VIEW -->
<div class="view" id="view-goals">
  <div class="wrap">
    <div id="goalsBox"><div class="loading"><div class="spin"></div>กำลังโหลด...</div></div>
  </div>
</div>

<!-- SETTINGS VIEW -->
<div class="view" id="view-settings">
  <div class="wrap">
    <div id="settingsBox"><div class="loading"><div class="spin"></div>กำลังโหลด...</div></div>
  </div>
</div>

<button class="fab" id="addBtn">
  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>เพิ่มเมนู
</button>

<div class="sheet-bg" id="sheetBg"></div>
<div class="sheet" id="sheet">
  <h3 id="sheetTitle">เพิ่มเมนูใหม่</h3>
  <div class="field"><label>ชื่อเมนู</label><input id="fName" placeholder="เช่น ข้าวกะเพราหมูไข่ดาว" /></div>
  <div class="field num"><label>ราคาขาย / จาน (฿)</label><input id="fPrice" type="number" inputmode="decimal" placeholder="60" /></div>
  <div class="field num"><label>ต้นทุนวัตถุดิบ / จาน (฿)</label><input id="fMat" type="number" inputmode="decimal" placeholder="22" /></div>
  <div class="field num"><label>ค่าแรง + โสหุ้ย / จาน (฿)</label><input id="fLabor" type="number" inputmode="decimal" placeholder="14" /></div>
  <div class="live"><span class="l">กำไรต่อจาน</span><span class="v" id="liveProfit">— ฿</span></div>
  <button class="save" id="saveBtn">บันทึกเมนู</button>
  <button class="cancel" id="cancelBtn">ยกเลิก</button>
</div>
<div class="toast" id="toast"></div>

<!-- TX EDIT SHEET -->
<div class="sheet-bg" id="txSheetBg"></div>
<div class="sheet" id="txSheet">
  <h3>แก้ไขรายการ</h3>
  <div class="field">
    <label>ประเภท</label>
    <div class="typetoggle">
      <button type="button" class="tt" data-t="income" id="ttInc">รายรับ</button>
      <button type="button" class="tt" data-t="expense" id="ttExp">รายจ่าย</button>
    </div>
  </div>
  <div class="field num"><label>ยอดเงิน (฿)</label><input id="txAmount" type="number" inputmode="decimal" placeholder="0" /></div>
  <div class="field"><label>หมวดหมู่</label><input id="txCat" placeholder="เช่น ค่าหมู, ขายอาหาร" /></div>
  <div class="field"><label>รายละเอียด (ไม่บังคับ)</label><input id="txNote" placeholder="โน้ตเพิ่มเติม" /></div>
  <button class="save" id="txSaveBtn">บันทึกการแก้ไข</button>
  <button class="cancel" id="txCancelBtn">ยกเลิก</button>
</div>

<script>
const API = location.origin;
let TOKEN = null, menus = [], editingId = null;
let curMonth = null; // YYYY-MM
let charts = { day:null, cat:null };

const $ = id => document.getElementById(id);
const baht = n => Math.round(n).toLocaleString('th-TH');
const escapeHtml = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function toast(msg){const t=$('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1800);}
function thisMonth(){const d=new Intl.DateTimeFormat('en-CA',{timeZone:'Asia/Bangkok',year:'numeric',month:'2-digit'}).format(new Date());return d.slice(0,7);}
function monthLabel(ym){const [y,m]=ym.split('-');const names=['','ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];return `${names[+m]} ${(+y)+543}`;}
function addMonth(ym,delta){let [y,m]=ym.split('-').map(Number);m+=delta;if(m<1){m=12;y--;}if(m>12){m=1;y++;}return `${y}-${String(m).padStart(2,'0')}`;}

async function api(path, opts={}){
  const res = await fetch(API+path, {...opts, headers:{'Content-Type':'application/json',Authorization:`Bearer ${TOKEN}`,...(opts.headers||{})}});
  if(!res.ok) throw new Error((await res.json().catch(()=>({}))).error || res.status);
  return res.json();
}

/* ---------- tabs ---------- */
let costLoaded=false;
function switchTab(name){
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===name));
  ['menu','report','goals','settings'].forEach(v=>$('view-'+v).classList.toggle('active',name===v));
  $('addBtn').classList.toggle('hide',name!=='menu');
  if(name==='report'){ if(!curMonth){curMonth=thisMonth();} loadReport(); if(!costLoaded){loadCostCompare();costLoaded=true;} }
  if(name==='goals'){ loadGoals(); }
  if(name==='settings'){ loadSettings(); }
}
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>switchTab(t.dataset.tab)));

/* ---------- menu tab ---------- */
const profitOf=(m,up=0)=>m.price-(m.material_cost*(1+up/100))-m.labor_cost;
const marginOf=(m,up=0)=>m.price>0?profitOf(m,up)/m.price*100:0;
const upPct=()=>+$('up').value;

function renderMenus(){
  const up=upPct();$('upVal').textContent=up+' %';
  $('count').textContent=menus.length?`${menus.length} เมนู`:'';
  const list=$('list');
  if(!menus.length){list.innerHTML=`<div class="empty"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11h18"/><path d="M5 11V7a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v4"/><path d="M5 11v8a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2v-8"/></svg><p>ยังไม่มีเมนู<br>กด "เพิ่มเมนู" เพื่อเริ่มดูกำไรต่อจาน</p></div>`;return;}
  list.innerHTML=menus.map(m=>{
    const pf=profitOf(m,up),mg=marginOf(m,up),mat=m.material_cost*(1+up/100);
    const total=Math.max(m.price,mat+m.labor_cost+Math.max(pf,0))||1;
    const wMat=mat/total*100,wLab=m.labor_cost/total*100,wPf=Math.max(pf,0)/total*100,neg=pf<0;
    return `<div class="menu"><div class="row1"><div class="name">${escapeHtml(m.name)}</div>
      <div class="profit"><div class="num ${neg?'neg':''}">${neg?'−':''}${baht(Math.abs(pf))}<span style="font-size:13px"> ฿</span></div><div class="cap">กำไร/จาน</div></div></div>
      <div class="bar"><span class="mat" style="width:${wMat}%"></span><span class="lab" style="width:${wLab}%"></span><span class="pf" style="width:${wPf}%"></span></div>
      <div class="meta"><span><span class="sw" style="background:var(--profit)"></span>ขาย <b>${baht(m.price)}</b></span>
        <span><span class="sw" style="background:var(--warn)"></span>วัตถุดิบ <b>${baht(mat)}</b>${up>0?` (+${up}%)`:''}</span>
        <span><span class="sw" style="background:var(--blue-bright)"></span>ค่าแรง <b>${baht(m.labor_cost)}</b></span></div>
      <span class="pill ${neg?'neg':''}">มาร์จิน ${mg.toFixed(0)}%</span>
      <div class="acts"><button onclick="openEdit(${m.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>แก้ไข</button>
      <button class="del" onclick="delMenu(${m.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>ลบ</button></div></div>`;
  }).join('');
}

function openSheet(){$('sheetBg').classList.add('show');$('sheet').classList.add('show');updateLive();}
function closeSheet(){$('sheetBg').classList.remove('show');$('sheet').classList.remove('show');}
function clearForm(){['fName','fPrice','fMat','fLabor'].forEach(id=>$(id).value='');}
function openAdd(){editingId=null;$('sheetTitle').textContent='เพิ่มเมนูใหม่';clearForm();openSheet();}
window.openEdit=function(id){const m=menus.find(x=>x.id===id);if(!m)return;editingId=id;$('sheetTitle').textContent='แก้ไขเมนู';$('fName').value=m.name;$('fPrice').value=m.price;$('fMat').value=m.material_cost;$('fLabor').value=m.labor_cost;openSheet();};
function updateLive(){const pf=(+$('fPrice').value||0)-(+$('fMat').value||0)-(+$('fLabor').value||0);const el=$('liveProfit');el.textContent=(pf<0?'−':'')+baht(Math.abs(pf))+' ฿';el.classList.toggle('neg',pf<0);}
['fPrice','fMat','fLabor'].forEach(id=>$(id).addEventListener('input',updateLive));
async function saveMenu(){
  const body={name:$('fName').value.trim(),price:+$('fPrice').value||0,material_cost:+$('fMat').value||0,labor_cost:+$('fLabor').value||0};
  if(!body.name){toast('ใส่ชื่อเมนูด้วยนะ');return;}
  $('saveBtn').disabled=true;
  try{
    if(editingId)await api('/api/menus/'+editingId,{method:'PUT',body:JSON.stringify(body)});
    else await api('/api/menus',{method:'POST',body:JSON.stringify(body)});
    closeSheet();await loadMenus();toast('บันทึกแล้ว');
  }catch(e){toast('ผิดพลาด: '+e.message);}finally{$('saveBtn').disabled=false;}
}
window.delMenu=async function(id){if(!confirm('ลบเมนูนี้?'))return;try{await api('/api/menus/'+id,{method:'DELETE'});await loadMenus();toast('ลบแล้ว');}catch(e){toast('ลบไม่สำเร็จ');}};
async function loadMenus(){menus=await api('/api/menus');renderMenus();}

/* ---------- report tab ---------- */
async function loadReport(){
  $('mLabel').textContent=monthLabel(curMonth);
  $('nextM').disabled = curMonth>=thisMonth();
  $('report').innerHTML='<div class="loading"><div class="spin"></div>กำลังโหลด...</div>';
  try{
    const [stats,txns]=await Promise.all([
      api('/api/stats?month='+curMonth),
      api('/api/transactions?limit=20'),
    ]);
    renderReport(stats,txns);
  }catch(e){ $('report').innerHTML=`<div class="empty"><p>โหลดรายงานไม่สำเร็จ<br><small>${escapeHtml(e.message||'')}</small></p></div>`; }
}

function renderReport(stats,txns){
  const t=stats.totals, neg=t.profit<0;
  const monthTxns = txns.filter(x=>x.date && x.date.slice(0,7)===curMonth);
  $('report').innerHTML=`
    <div class="kpis">
      <div class="kpi inc"><div class="k">รายรับ</div><div class="v">${baht(t.income)}</div></div>
      <div class="kpi exp"><div class="k">รายจ่าย</div><div class="v">${baht(t.expense)}</div></div>
      <div class="kpi pf"><div class="k">กำไรสุทธิ</div><div class="v ${neg?'neg':''}">${neg?'−':''}${baht(Math.abs(t.profit))}</div></div>
    </div>
    <div class="panel"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 4-5"/></svg>รายรับ-รายจ่าย รายวัน</h3><div class="chartbox"><canvas id="cDay"></canvas></div></div>
    <div class="panel"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-9-9v9z"/><path d="M21 12a9 9 0 0 0-9-9"/></svg>รายจ่ายแยกหมวด</h3><div class="chartbox sm">${stats.categories.length?'<canvas id="cCat"></canvas>':'<div class="empty" style="padding:30px"><p>ยังไม่มีรายจ่ายเดือนนี้</p></div>'}</div></div>
    <div class="panel"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 5h18M3 12h18M3 19h18"/></svg>รายการล่าสุด</h3><div id="txList"></div></div>
  `;
  drawDayChart(stats.days);
  if(stats.categories.length) drawCatChart(stats.categories);
  renderTxns(monthTxns.length?monthTxns:txns);
}

function destroyChart(k){ if(charts[k]){charts[k].destroy();charts[k]=null;} }
function drawDayChart(days){
  destroyChart('day');
  if(!window.Chart){return;}
  const labels=days.map(d=>+d.date.slice(8,10));
  charts.day=new Chart($('cDay'),{type:'bar',data:{labels,datasets:[
    {label:'รายรับ',data:days.map(d=>d.income),backgroundColor:'#00a86b',borderRadius:4,maxBarThickness:14},
    {label:'รายจ่าย',data:days.map(d=>d.expense),backgroundColor:'#f0883e',borderRadius:4,maxBarThickness:14}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{font:{family:'IBM Plex Sans Thai'},boxWidth:12,padding:14}},tooltip:{callbacks:{label:c=>c.dataset.label+': '+(+c.raw).toLocaleString('th-TH')+' ฿'}}},
    scales:{x:{grid:{display:false},ticks:{font:{family:'IBM Plex Mono',size:10}}},y:{grid:{color:'#eef2f9'},ticks:{font:{family:'IBM Plex Mono',size:10},callback:v=>v>=1000?(v/1000)+'k':v}}}}});
}
function drawCatChart(cats){
  destroyChart('cat');
  if(!window.Chart){return;}
  const palette=['#1f6bff','#f0883e','#00a86b','#4d8dff','#9b6dff','#e5484d','#13b6c9','#f5b301','#8197b8'];
  charts.cat=new Chart($('cCat'),{type:'doughnut',data:{labels:cats.map(c=>c.category),datasets:[{data:cats.map(c=>c.amount),backgroundColor:palette,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'62%',plugins:{legend:{position:'right',labels:{font:{family:'IBM Plex Sans Thai',size:12},boxWidth:12,padding:9}},tooltip:{callbacks:{label:c=>c.label+': '+(+c.raw).toLocaleString('th-TH')+' ฿'}}}}});
}

function renderTxns(txns){
  window._txns=txns;
  const el=$('txList');
  if(!txns.length){el.innerHTML='<div class="empty" style="padding:24px"><p>ยังไม่มีรายการ</p></div>';return;}
  el.innerHTML=txns.map(x=>{
    const inc=x.type==='income';
    const title=x.note||x.category||(inc?'รายรับ':'รายจ่าย');
    const d=x.date?x.date.slice(8,10)+'/'+x.date.slice(5,7):'';
    return `<div class="tx ${inc?'inc':'exp'}"><div class="ic">${inc
      ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 19V5"/><path d="m5 12 7-7 7 7"/></svg>'
      :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="m19 12-7 7-7-7"/></svg>'}</div>
      <div class="mid"><div class="t1">${escapeHtml(title)}</div><div class="t2">${d}${x.category?' · '+escapeHtml(x.category):''}</div></div>
      <div class="amt">${inc?'+':'−'}${baht(x.amount)} ฿</div>
      <button class="edit" onclick="openTxEdit(${x.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg></button>
      <button class="trash" onclick="delTxn(${x.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg></button></div>`;
  }).join('');
}
let txEditId=null, txEditType='expense';
function setTxType(t){txEditType=t;$('ttInc').classList.toggle('on',t==='income');$('ttExp').classList.toggle('on',t==='expense');}
window.openTxEdit=function(id){
  const x=(window._txns||[]).find(t=>t.id===id);if(!x)return;
  txEditId=id;setTxType(x.type);
  $('txAmount').value=x.amount;$('txCat').value=x.category||'';$('txNote').value=x.note||'';
  $('txSheet').classList.add('show');$('txSheetBg').classList.add('show');
};
function closeTxSheet(){$('txSheet').classList.remove('show');$('txSheetBg').classList.remove('show');txEditId=null;}
async function saveTx(){
  const amount=+$('txAmount').value;
  if(!(amount>0)){toast('ใส่ยอดเงินก่อน');return;}
  try{
    await api('/api/transactions/'+txEditId,{method:'PUT',body:JSON.stringify({type:txEditType,amount,category:$('txCat').value.trim(),note:$('txNote').value.trim()})});
    toast('แก้ไขแล้ว');closeTxSheet();await loadReport();
  }catch(e){toast('บันทึกไม่สำเร็จ');}
}
$('ttInc').addEventListener('click',()=>setTxType('income'));
$('ttExp').addEventListener('click',()=>setTxType('expense'));
$('txSaveBtn').addEventListener('click',saveTx);
$('txCancelBtn').addEventListener('click',closeTxSheet);
$('txSheetBg').addEventListener('click',closeTxSheet);
window.delTxn=async function(id){if(!confirm('ลบรายการนี้?'))return;try{await api('/api/transactions/'+id,{method:'DELETE'});toast('ลบแล้ว');await loadReport();}catch(e){toast('ลบไม่สำเร็จ');}};

$('prevM').addEventListener('click',()=>{curMonth=addMonth(curMonth,-1);loadReport();});
$('nextM').addEventListener('click',()=>{if(curMonth<thisMonth()){curMonth=addMonth(curMonth,1);loadReport();}});
$('up').addEventListener('input',renderMenus);
$('addBtn').addEventListener('click',openAdd);
$('saveBtn').addEventListener('click',saveMenu);
$('cancelBtn').addEventListener('click',closeSheet);
$('sheetBg').addEventListener('click',closeSheet);

/* ---------- goals tab ---------- */
function goalBlock(label,period,current,goal){
  const pct=goal>0?Math.min(100,current/goal*100):0;
  const done=goal>0&&current>=goal;
  return `<div class="goalcard">
    <div class="gh">${label}</div>
    <div class="grow"><div class="gnow">${baht(current)} ฿</div><div class="gtarget">${goal?('เป้า '+baht(goal)+' ฿'):'ยังไม่ตั้งเป้า'}</div></div>
    ${goal?`<div class="pbar"><div class="pfill ${done?'done':''}" style="width:${pct}%"></div></div>
      <div class="ghint ${done?'done':''}">${done?('🎉 ถึงเป้าแล้ว ('+Math.round(pct)+'%)'):('อีก '+baht(Math.max(0,goal-current))+' ฿ ถึงเป้า ('+Math.round(pct)+'%)')}</div>`:''}
    <div class="goalform">
      <input type="number" inputmode="decimal" id="gi_${period}" placeholder="${goal?baht(goal):'ตั้งเป้า (฿)'}" />
      <button onclick="saveGoal('${period}')">${goal?'แก้ไข':'ตั้งเป้า'}</button>
      ${goal?`<button onclick="saveGoal('${period}',true)" style="background:#eef3fc;color:var(--ink-soft)">ลบ</button>`:''}
    </div></div>`;
}
async function loadGoals(){
  $('goalsBox').innerHTML='<div class="loading"><div class="spin"></div>กำลังโหลด...</div>';
  try{
    const d=await api('/api/goals');
    $('goalsBox').innerHTML=goalBlock('ยอดขายวันนี้','daily',d.todayIncome,d.daily||0)
      +goalBlock('ยอดขายเดือนนี้','monthly',d.monthIncome,d.monthly||0);
  }catch(e){$('goalsBox').innerHTML='<div class="empty"><p>โหลดไม่สำเร็จ</p></div>';}
}
window.saveGoal=async function(period,del){
  let val=null;
  if(!del){const v=$('gi_'+period).value;if(!v||+v<=0){toast('ใส่ตัวเลขเป้าก่อน');return;}val=Math.round(+v);}
  try{await api('/api/goals',{method:'POST',body:JSON.stringify({[period]:val})});toast(del?'ลบเป้าแล้ว':'ตั้งเป้าแล้ว');loadGoals();}
  catch(e){toast('บันทึกไม่สำเร็จ');}
};

/* ---------- settings tab ---------- */
async function loadSettings(){
  $('settingsBox').innerHTML='<div class="loading"><div class="spin"></div>กำลังโหลด...</div>';
  try{
    const s=await api('/api/settings');
    const isPro=s.tier==='pro';
    const qpct=s.aiLimit>0?Math.min(100,Math.round(s.aiUsed/s.aiLimit*100)):0;
    $('settingsBox').innerHTML=`
      <div class="panel"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 15 8.5 22 9.3l-5 4.6 1.4 7L12 17.8 5.6 20.9 7 13.9l-5-4.6 7-0.8Z"/></svg>แพ็กเกจของฉัน</h3>
        <div class="setrow"><div><div class="sl">แพ็กเกจปัจจุบัน</div><div class="sd">${isPro?('Pro'+(s.tierUntil?' · ถึง '+s.tierUntil:'')):'Free'}</div></div>
          <div style="flex:none;background:${isPro?'#c8920a':'#eef3fc'};color:${isPro?'#fff':'#67789a'};font-family:Kanit;font-weight:700;font-size:13px;padding:6px 14px;border-radius:14px">${isPro?'PRO':'FREE'}</div></div>
        <div style="padding-top:12px">
          <div style="display:flex;justify-content:space-between;font-size:13px"><span style="color:#67789a">ใช้ AI วันนี้</span><span style="font-weight:700;color:${s.aiUsed>=s.aiLimit?'#e5484d':'#0a1f44'}">${s.aiUsed} / ${s.aiLimit} ครั้ง</span></div>
          <div class="pbar"><div class="pfill ${s.aiUsed>=s.aiLimit?'':''}" style="width:${Math.max(2,qpct)}%;background:${s.aiUsed>=s.aiLimit?'#e5484d':'#1f6bff'}"></div></div>
          <div class="sd">คำสั่งดูข้อมูล (สรุป/รายงาน/งบ) ใช้ได้ไม่จำกัด</div>
        </div>
      </div>
      <div class="panel"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg>การแจ้งเตือน</h3>
        <div class="setrow"><div><div class="sl">สรุปยอดรายวัน</div><div class="sd">บอทส่งสรุปยอด + กำไรให้ทุกเย็น</div></div>
          <div class="switch ${s.dailySummary?'on':''}" id="swDaily" onclick="toggleDaily()"></div></div>
      </div>
      <div class="panel"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><path d="M14 2v6h6"/><path d="M12 18v-6"/><path d="m9 15 3 3 3-3"/></svg>ส่งออกรายงาน Excel</h3>
        <div class="sd" style="margin-bottom:13px">ดาวน์โหลดไฟล์ Excel รายเดือน (รายการ + สรุป + หมวดรายจ่าย) ส่งให้บัญชีหรือยื่นภาษีได้เลย</div>
        <a class="bigbtn" href="#" onclick="return doExport(thisMonth())"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>ดาวน์โหลดเดือนนี้</a>
        <a class="bigbtn ghost" href="#" onclick="return doExport(addMonth(thisMonth(),-1))" style="margin-top:10px">ดาวน์โหลดเดือนก่อน</a>
      </div>
      <div class="panel"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v6h6"/><path d="M3 13a9 9 0 1 0 3-7.7L3 8"/></svg>รายจ่ายประจำ</h3>
        <div class="sd" style="margin-bottom:12px">ตั้งครั้งเดียว (ค่าเช่า เงินเดือน ค่าน้ำค่าไฟ) ระบบลงรายจ่ายให้อัตโนมัติทุกเดือน</div>
        <div id="recurBox"><div class="loading"><div class="spin"></div>กำลังโหลด...</div></div>
        <div class="recur-add">
          <input id="rcName" placeholder="ชื่อ เช่น ค่าเช่าร้าน" />
          <div class="recur-add-row">
            <input id="rcAmount" type="number" inputmode="decimal" placeholder="ยอด (฿)" />
            <input id="rcDay" type="number" inputmode="numeric" min="1" max="28" placeholder="วันที่ (1-28)" />
            <button onclick="addRecurring()">เพิ่ม</button>
          </div>
        </div>
      </div>`;
    loadRecurring();
  }catch(e){$('settingsBox').innerHTML='<div class="empty"><p>โหลดไม่สำเร็จ</p></div>';}
}
window.toggleDaily=async function(){
  const el=$('swDaily');const next=!el.classList.contains('on');el.classList.toggle('on',next);
  try{await api('/api/settings',{method:'POST',body:JSON.stringify({dailySummary:next})});toast(next?'เปิดแจ้งเตือนแล้ว':'ปิดแจ้งเตือนแล้ว');}
  catch(e){el.classList.toggle('on',!next);toast('บันทึกไม่สำเร็จ');}
};
window.doExport=async function(ym){
  toast('กำลังเตรียมไฟล์...');
  try{const r=await api('/api/export-link?month='+ym);
    if(window.liff&&liff.openWindow){liff.openWindow({url:r.url,external:true});}else{window.open(r.url,'_blank');}
  }catch(e){toast('สร้างลิงก์ไม่สำเร็จ');}
  return false;
};

/* ---------- recurring expenses ---------- */
async function loadRecurring(){
  try{
    const items=await api('/api/recurring');
    const box=$('recurBox');
    if(!items.length){box.innerHTML='<div class="sd" style="padding:8px 0 4px;color:#9aa9c2">ยังไม่มีรายจ่ายประจำ</div>';return;}
    box.innerHTML=items.map(r=>`<div class="recur ${r.active?'':'off'}">
      <div class="rc-mid"><div class="rc-name">${escapeHtml(r.name)}</div><div class="rc-sub">ทุกวันที่ ${r.day} · ${baht(r.amount)} ฿/เดือน${r.active?'':' · ปิดอยู่'}</div></div>
      <div class="switch sm ${r.active?'on':''}" onclick="toggleRecur(${r.id},${r.active?0:1})"></div>
      <button class="trash" onclick="delRecur(${r.id})"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg></button>
    </div>`).join('');
  }catch(e){$('recurBox').innerHTML='<div class="sd">โหลดไม่สำเร็จ</div>';}
}
window.addRecurring=async function(){
  const name=$('rcName').value.trim(),amount=+$('rcAmount').value,day=parseInt($('rcDay').value,10);
  if(!name){toast('ใส่ชื่อรายการก่อน');return;}
  if(!(amount>0)){toast('ใส่ยอดเงิน');return;}
  if(!(day>=1&&day<=28)){toast('วันที่ต้องเป็น 1-28');return;}
  try{await api('/api/recurring',{method:'POST',body:JSON.stringify({name,amount,day})});
    $('rcName').value='';$('rcAmount').value='';$('rcDay').value='';toast('เพิ่มแล้ว');loadRecurring();
  }catch(e){toast(e.message||'เพิ่มไม่สำเร็จ');}
};
window.toggleRecur=async function(id,active){
  try{await api('/api/recurring/'+id+'/toggle',{method:'POST',body:JSON.stringify({active:!!active})});loadRecurring();}
  catch(e){toast('ไม่สำเร็จ');}
};
window.delRecur=async function(id){
  if(!confirm('ลบรายจ่ายประจำนี้?'))return;
  try{await api('/api/recurring/'+id,{method:'DELETE'});toast('ลบแล้ว');loadRecurring();}
  catch(e){toast('ลบไม่สำเร็จ');}
};

/* ---------- cost compare (in report) ---------- */
async function loadCostCompare(){
  try{
    const d=await api('/api/cost-compare');
    if(!d.rows||!d.rows.length){$('costPanel').innerHTML='';return;}
    const top=d.rows.filter(r=>r.status==='up'&&r.cur>=100).sort((a,b)=>b.pct-a.pct)[0];
    const rowsHtml=d.rows.slice(0,8).map(r=>{
      let badge,col;
      if(r.status==='new'){badge='ใหม่';col='#f0883e';}
      else if(r.status==='up'){badge='▲ +'+r.pct+'%';col='#e5484d';}
      else if(r.status==='down'){badge='▼ −'+Math.abs(r.pct)+'%';col='#00a86b';}
      else{badge='— เท่าเดิม';col='#9aa9c2';}
      return `<div class="costrow"><div><div class="cn">${escapeHtml(r.category)}</div><div class="cs">${baht(r.cur)} ฿ · เดือนก่อน ${baht(r.prev)} ฿</div></div><div class="cbadge" style="color:${col}">${badge}</div></div>`;
    }).join('');
    $('costPanel').innerHTML=`<div class="panel"><h3><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>เทียบต้นทุนกับเดือนก่อน</h3>
      <div class="cs" style="margin-bottom:10px;color:#9aa9c2">${escapeHtml(d.period)}</div>
      ${top?`<div class="warnbox">⚠️ ${escapeHtml(top.category)} ขึ้น ${top.pct}% จากเดือนก่อน</div>`:''}
      ${rowsHtml}</div>`;
  }catch(e){$('costPanel').innerHTML='';}
}

/* ---------- init ---------- */
(async()=>{
  try{
    const cfg=await fetch(API+'/api/config').then(r=>r.json());
    if(!cfg.liffId){$('list').innerHTML='<div class="empty"><p>ยังไม่ได้ตั้งค่า LIFF_ID</p></div>';return;}
    await liff.init({liffId:cfg.liffId});
    if(!liff.isLoggedIn()){liff.login();return;}
    TOKEN=liff.getAccessToken();
    await loadMenus();
    const params=new URLSearchParams(location.search);
    if(params.get('tab')==='report'){switchTab('report');}
  }catch(e){
    console.error(e);
    $('list').innerHTML='<div class="empty"><p>เปิดผ่านแอป LINE เพื่อใช้งานนะครับ<br><small>'+escapeHtml(e.message||'')+'</small></p></div>';
  }
})();
</script>
